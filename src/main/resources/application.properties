# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/manjo_payment
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# App Custom Properties
app.signature.secret-key=MANJO-SECRET-KEY-2025-PAYMENT-GATEWAY
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# SpringDoc / Swagger (Back to Default for stability)
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Configuration
app.jwt.secret=manjo-very-secret-key-for-jwt-2026-payment-gateway-must-be-long
app.jwt.expiration=3600000

# Payment Configuration
app.payment.qr-expiry-minutes=15
